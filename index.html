<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index, follow" />
    <title>Schwartz and Associates | Northern Colorado Real Estate | Fort Collins, Loveland & Greeley</title>
    <meta name="description" content="Schwartz and Associates, Coldwell Banker Realty — Northern Colorado real estate agents serving Fort Collins, Loveland, Windsor, Greeley, and 19+ Front Range communities." />
    <link rel="canonical" href="https://saahomes.com/" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://em.realscout.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- Google tag (gtag.js) — saahomes.com web stream -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BVWCZE025P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-BVWCZE025P');
    </script>
    
    <!-- RealScout Web Components - Load in head for better compatibility -->
    <script src="https://em.realscout.com/widgets/realscout-web-components.umd.js" type="module"></script>
    
    <!-- RealScout Widget Customization Styles -->
    <style>
      /* Simple Search Widget Styles */
      realscout-simple-search {
        --rs-ss-font-primary-color: #6a6d72;
        --rs-ss-searchbar-border-color: hsl(0, 0%, 80%);
        --rs-ss-box-shadow: 0 10px 15px -3px #0000001a;
        --rs-ss-widget-width: 100% !important;
        max-width: 100%;
        width: 100%;
      }
      
      realscout-advanced-search {
        --rs-as-button-text-color: #ffffff;
        --rs-as-background-color: #ffffff;
        --rs-as-button-color: rgb(35, 93, 137);
        --rs-as-widget-width: 100% !important;
        max-width: 100%;
        width: 100%;
      }
      
      /* Home Value Widget Styles */
      realscout-home-value {
        --rs-hvw-background-color: #ffffff;
        --rs-hvw-title-color: #000000;
        --rs-hvw-subtitle-color: rgba(28, 30, 38, 0.5);
        --rs-hvw-primary-button-text-color: #ffffff;
        --rs-hvw-primary-button-color: rgb(35, 93, 137);
        --rs-hvw-secondary-button-text-color: rgb(35, 93, 137);
        --rs-hvw-secondary-button-color: #ffffff;
        --rs-hvw-widget-width: auto;
      }
      @media (min-width: 640px) {
        realscout-simple-search {
          --rs-ss-widget-width: 500px !important;
        }
        realscout-advanced-search {
          --rs-as-widget-width: 500px !important;
        }
      }
    </style>

    <!-- Prerendered content styles — visible immediately before React hydrates, prevents flash of unstyled content -->
    <style>
      /* === Font fallbacks (Lora for serif, Open Sans for sans) === */
      .prerendered-blog-content h1,
      .prerendered-blog-content h2,
      .prerendered-blog-content h3,
      .prerendered-area-content h1,
      .prerendered-area-content h2,
      .prerendered-area-content h3,
      .prerendered-money-content h1,
      .prerendered-money-content h2,
      .prerendered-money-content h3,
      .prerendered-chfa-content h1,
      .prerendered-chfa-content h2,
      .prerendered-chfa-content h3,
      .prerendered-generic-content h1 {
        font-family: 'Lora', Georgia, 'Times New Roman', serif;
        font-weight: 700;
        color: #111827;
      }
      .prerendered-blog-content,
      .prerendered-blog-content p,
      .prerendered-area-content,
      .prerendered-area-content p,
      .prerendered-money-content,
      .prerendered-money-content p,
      .prerendered-chfa-content,
      .prerendered-chfa-content p,
      .prerendered-generic-content {
        font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
        color: #374151;
        line-height: 1.625;
      }

      /* === Blog page styles === */
      .prerendered-blog-content {
        max-width: 768px;
        margin: 0 auto;
        padding: 3rem 1.5rem;
      }
      .prerendered-blog-content h1 {
        font-size: 2.25rem;
        line-height: 1.25;
        margin-bottom: 0.5rem;
      }
      @media (min-width: 640px) {
        .prerendered-blog-content h1 { font-size: 3rem; }
      }
      .prerendered-blog-content h2 {
        font-size: 1.5rem;
        line-height: 1.375;
        margin-bottom: 1rem;
        margin-top: 2.5rem;
      }
      @media (min-width: 640px) {
        .prerendered-blog-content h2 { font-size: 1.875rem; }
      }
      .prerendered-blog-content h3 {
        font-size: 1.125rem;
        line-height: 1.5;
        margin-bottom: 0.5rem;
        margin-top: 1.5rem;
      }
      .prerendered-blog-content p {
        font-size: 1.125rem;
        line-height: 1.75;
        margin-bottom: 1rem;
      }
      .prerendered-blog-content ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .prerendered-blog-content li {
        font-size: 1.125rem;
        line-height: 1.75;
        margin-bottom: 0.5rem;
      }
      .prerendered-blog-content a {
        color: #000;
        font-weight: 600;
        text-decoration: underline;
      }
      .prerendered-blog-content a:hover {
        color: #374151;
      }
      .prerendered-blog-meta {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 2rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .prerendered-blog-meta strong {
        color: #CFB36E;
        font-weight: 600;
      }
      .prerendered-blog-section {
        margin-bottom: 2.5rem;
      }
      .prerendered-blog-section a {
        color: #000;
        font-weight: 600;
        text-decoration: underline;
      }
      .prerendered-blog-links {
        list-style: none;
        padding-left: 0;
      }
      .prerendered-blog-links li {
        padding: 0.5rem 0;
        border-bottom: 1px solid #e5e7eb;
      }
      .prerendered-blog-related {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 0.75rem;
        padding: 1.5rem;
        margin: 2rem 0;
      }
      .prerendered-blog-related h3 {
        margin-top: 0;
        font-size: 1.125rem;
      }
      .prerendered-blog-related ul {
        list-style: none;
        padding-left: 0;
      }
      .prerendered-blog-related li {
        padding: 0.75rem 0;
        border-bottom: 1px solid #fde68a;
      }
      .prerendered-blog-cta {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        padding: 2rem;
        margin-top: 3rem;
      }
      .prerendered-cta-button {
        display: inline-block;
        background: #000;
        color: #fff !important;
        padding: 0.75rem 1.5rem;
        border-radius: 0.375rem;
        font-weight: 600;
        text-decoration: none !important;
      }
      .prerendered-cta-button:hover {
        background: #1f2937;
      }
      .prerendered-cta {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        padding: 2rem;
        margin-top: 2rem;
        text-align: center;
      }
      .prerendered-cta h2, .prerendered-cta h3 {
        margin-top: 0;
      }
      .prerendered-cta p {
        font-size: 1rem;
        color: #4b5563;
      }

      /* === FAQ section (shared across all page types) === */
      .prerendered-faq {
        margin: 2.5rem 0;
      }
      .prerendered-faq h2 {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .prerendered-faq > div {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .prerendered-faq h3 {
        font-size: 1.125rem;
        margin-top: 0;
        margin-bottom: 0.5rem;
      }
      .prerendered-faq p {
        font-size: 1rem;
        line-height: 1.625;
        margin-bottom: 0;
      }

      /* === Area page styles === */
      .prerendered-area-content {
        max-width: 768px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .prerendered-area-content h1 {
        font-size: 1.875rem;
        margin-bottom: 0.5rem;
      }
      @media (min-width: 640px) {
        .prerendered-area-content h1 { font-size: 2.25rem; }
      }
      .prerendered-area-content h2 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        margin-top: 2rem;
      }
      .prerendered-area-content p {
        font-size: 1.0625rem;
        line-height: 1.75;
        margin-bottom: 1rem;
      }
      .prerendered-tagline {
        font-size: 1.125rem;
        color: #4b5563;
        margin-bottom: 1rem;
      }
      .prerendered-county {
        font-size: 0.875rem;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }
      .prerendered-intro {
        font-size: 1.125rem;
        line-height: 1.75;
      }
      .prerendered-nearby {
        background: #f9fafb;
        border-radius: 0.75rem;
        padding: 1.5rem;
        margin: 2rem 0;
      }
      .prerendered-nearby ul {
        list-style: none;
        padding-left: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .prerendered-nearby li a {
        display: inline-block;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        padding: 0.5rem 1rem;
        color: #374151;
        font-weight: 500;
        text-decoration: none;
      }
      .prerendered-nearby li a:hover {
        border-color: #CFB36E;
      }
      .prerendered-city-guides {
        margin: 2rem 0;
      }
      .prerendered-city-guides ul {
        list-style: none;
        padding-left: 0;
      }
      .prerendered-city-guides li {
        padding: 0.75rem 0;
        border-bottom: 1px solid #e5e7eb;
      }
      .prerendered-city-guides a {
        color: #000;
        font-weight: 600;
        text-decoration: underline;
      }

      /* === Money page styles === */
      .prerendered-money-content {
        max-width: 768px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .prerendered-money-content h1 {
        font-size: 1.875rem;
        margin-bottom: 1rem;
      }
      .prerendered-money-content h2 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
        margin-top: 2rem;
      }
      .prerendered-money-content p {
        font-size: 1.0625rem;
        line-height: 1.75;
        margin-bottom: 1rem;
      }
      .prerendered-money-content ul {
        list-style: disc;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .prerendered-money-content li {
        font-size: 1.0625rem;
        line-height: 1.75;
        margin-bottom: 0.5rem;
      }

      /* === Testimonials === */
      .prerendered-testimonials {
        margin: 2rem 0;
      }
      .prerendered-testimonial {
        background: #f9fafb;
        border-left: 4px solid #CFB36E;
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
        border-radius: 0 0.5rem 0.5rem 0;
      }
      .prerendered-testimonial p {
        font-size: 1rem;
        line-height: 1.625;
        margin-bottom: 0.25rem;
      }
      .prerendered-testimonial p:last-child {
        font-weight: 600;
        color: #111827;
      }

      /* === CHFA page styles === */
      .prerendered-chfa-content {
        max-width: 768px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .prerendered-chfa-content h1 {
        font-size: 1.875rem;
        margin-bottom: 0.5rem;
      }
      .prerendered-chfa-content h2 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        margin-top: 2rem;
      }
      .prerendered-chfa-content h3 {
        font-size: 1.125rem;
        margin-bottom: 0.5rem;
      }
      .prerendered-chfa-content p {
        font-size: 1.0625rem;
        line-height: 1.75;
        margin-bottom: 1rem;
      }
      .prerendered-chfa-content ul {
        list-style: disc;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .prerendered-chfa-content li {
        font-size: 1.0625rem;
        line-height: 1.75;
        margin-bottom: 0.5rem;
      }
      .prerendered-table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.9375rem;
      }
      .prerendered-table thead {
        background: #111827;
        color: #fff;
      }
      .prerendered-table th,
      .prerendered-table td {
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        text-align: left;
      }
      .prerendered-table tbody tr:nth-child(even) {
        background: #f9fafb;
      }
      .prerendered-dpa-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 640px) {
        .prerendered-dpa-grid { grid-template-columns: 1fr; }
      }
      .prerendered-dpa-card {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 1.25rem;
      }
      .prerendered-dpa-card h3 {
        margin-top: 0;
        font-family: 'Lora', Georgia, serif;
      }
      .prerendered-dpa-card p {
        font-size: 0.9375rem;
      }

      /* === Generic content === */
      .prerendered-generic-content {
        max-width: 768px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .prerendered-generic-content h1 {
        font-size: 2.25rem;
        margin-bottom: 1rem;
      }

      /* === Hide empty content that prerender may leave === */
      .prerendered-blog-content p:empty,
      .prerendered-area-content p:empty,
      .prerendered-money-content p:empty {
        display: none;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
